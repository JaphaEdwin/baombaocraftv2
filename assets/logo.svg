<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60">
  <!-- BaoMbao Craft Full Logo -->
  <defs>
    <linearGradient id="logoWoodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B3832"/>
      <stop offset="100%" style="stop-color:#5C4033"/>
    </linearGradient>
    <linearGradient id="logoGoldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8972F"/>
    </linearGradient>
  </defs>
  
  <!-- Icon Element - Stylized wood plank/door -->
  <g transform="translate(0, 5)">
    <!-- Outer frame -->
    <rect x="2" y="2" width="46" height="46" rx="4" fill="none" stroke="url(#logoWoodGrad)" stroke-width="2"/>
    <!-- Inner panels -->
    <rect x="8" y="8" width="34" height="16" rx="2" fill="none" stroke="url(#logoGoldGrad)" stroke-width="1.5"/>
    <rect x="8" y="28" width="34" height="16" rx="2" fill="none" stroke="url(#logoGoldGrad)" stroke-width="1.5"/>
    <!-- Door handle -->
    <circle cx="38" cy="26" r="3" fill="url(#logoGoldGrad)"/>
  </g>
  
  <!-- Text: BaoMbao -->
  <text x="60" y="38" font-family="'Playfair Display', Georgia, serif" font-size="32" font-weight="600" fill="url(#logoWoodGrad)">
    BaoMbao
  </text>
  
  <!-- Text: Craft -->
  <text x="190" y="38" font-family="'Cormorant Garamond', Georgia, serif" font-size="24" font-weight="400" font-style="italic" fill="url(#logoGoldGrad)">
    Craft
  </text>
  
  <!-- Decorative line -->
  <line x1="60" y1="48" x2="245" y2="48" stroke="url(#logoGoldGrad)" stroke-width="1" opacity="0.5"/>
</svg>
