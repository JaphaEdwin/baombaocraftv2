<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Door Icon -->
  <defs>
    <linearGradient id="doorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8972F"/>
    </linearGradient>
  </defs>
  
  <!-- Door frame -->
  <rect x="12" y="4" width="40" height="56" rx="3" fill="none" stroke="url(#doorGrad)" stroke-width="2.5"/>
  
  <!-- Top panel -->
  <rect x="18" y="10" width="28" height="18" rx="2" fill="none" stroke="url(#doorGrad)" stroke-width="1.5"/>
  
  <!-- Bottom panel -->
  <rect x="18" y="34" width="28" height="18" rx="2" fill="none" stroke="url(#doorGrad)" stroke-width="1.5"/>
  
  <!-- Door handle -->
  <circle cx="44" cy="32" r="4" fill="url(#doorGrad)"/>
  <circle cx="44" cy="32" r="2" fill="#4B3832"/>
</svg>
