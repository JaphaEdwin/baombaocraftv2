<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Smart IoT Icon -->
  <defs>
    <linearGradient id="iotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8972F"/>
    </linearGradient>
  </defs>
  
  <!-- Central hub -->
  <circle cx="32" cy="32" r="8" fill="none" stroke="url(#iotGrad)" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="3" fill="url(#iotGrad)"/>
  
  <!-- Signal waves -->
  <path d="M32 16 A16 16 0 0 1 48 32" fill="none" stroke="url(#iotGrad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 8 A24 24 0 0 1 56 32" fill="none" stroke="url(#iotGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <path d="M32 48 A16 16 0 0 1 16 32" fill="none" stroke="url(#iotGrad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M32 56 A24 24 0 0 1 8 32" fill="none" stroke="url(#iotGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Connection dots -->
  <circle cx="16" cy="16" r="4" fill="url(#iotGrad)" opacity="0.8"/>
  <circle cx="48" cy="48" r="4" fill="url(#iotGrad)" opacity="0.8"/>
  <circle cx="48" cy="16" r="3" fill="url(#iotGrad)" opacity="0.6"/>
  <circle cx="16" cy="48" r="3" fill="url(#iotGrad)" opacity="0.6"/>
</svg>
